<main class="mx-auto w-full max-w-[1320px] px-4 py-7 sm:px-8" data-aos="fade-up">
  <section class="mb-5 flex items-end justify-between gap-3">
    <div>
      <h2 class="text-2xl font-black">Clientes</h2>
      <p class="mt-1 text-sm text-slate-500">Seleccione un cliente para iniciar la gestión.</p>
    </div>
    <span class="text-sm font-medium text-slate-500">{{ filteredClients().length }} clientes</span>
  </section>

  <div class="mb-6 rounded-lg bg-white p-4 shadow-sm">
    <label class="relative block">
      <mat-icon class="pointer-events-none absolute left-3 top-2.5 !text-[20px] text-slate-400">
        search
      </mat-icon>
      <input
        class="h-10 w-full rounded-md border border-slate-200 pl-10 pr-3 outline-none transition focus:border-[#3e5f8b]"
        placeholder="Buscar por cliente, localidad, dirección o teléfono..."
        [ngModel]="query()"
        (ngModelChange)="query.set($event)"
      />
    </label>
  </div>

  <section class="overflow-hidden rounded-lg bg-white shadow-sm">
    <div
      class="hidden grid-cols-[1.3fr_0.8fr_1fr_0.75fr_32px] gap-4 border-b border-slate-200 bg-slate-50 px-5 py-3 text-xs font-black uppercase text-slate-500 lg:grid"
    >
      <span>Cliente</span>
      <span>Localidad</span>
      <span>Dirección</span>
      <span>Teléfono</span>
      <span></span>
    </div>

    @for (client of filteredClients(); track client.id) {
      <button
        type="button"
        class="grid w-full cursor-pointer gap-4 border-b border-slate-100 px-5 py-4 text-left transition last:border-b-0 hover:bg-blue-50 lg:grid-cols-[1.3fr_0.8fr_1fr_0.75fr_32px] lg:items-center"
        [class.bg-blue-50]="activeClientId() === client.id"
        (click)="selectClient(client)"
      >
        <div class="border-l-4 border-[#45658f] pl-4">
          <strong class="block text-base font-black uppercase text-[#082653]">{{
            client.name
          }}</strong>
          @if (activeClientId() === client.id) {
            <small
              class="mt-1 inline-flex rounded-full bg-blue-100 px-2 py-0.5 font-bold text-blue-700"
            >
              Cliente activo
            </small>
          }
        </div>
        <span class="text-sm text-slate-700">{{ client.locality }}</span>
        <span class="text-sm text-slate-700">{{ client.address }}</span>
        <span class="text-sm font-medium text-slate-700">{{ client.phone }}</span>
        <mat-icon class="text-slate-400">chevron_right</mat-icon>
      </button>
    } @empty {
      <div class="px-5 py-12 text-center text-slate-500">No se encontraron clientes.</div>
    }
  </section>
</main>
