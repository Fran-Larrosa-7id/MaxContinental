<section class="max-h-[90dvh] overflow-hidden rounded-lg bg-white text-[#082653] shadow-2xl">
  <header class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
    <div>
      <h2 class="text-xl font-black">Pedido de muestras</h2>
      <p class="mt-1 text-sm text-slate-500">
        {{ totalLines() }} artículos · {{ cartCount() }} unidades
      </p>
    </div>
    <button
      type="button"
      class="flex size-9 items-center justify-center rounded-md text-slate-400 transition hover:bg-slate-100 hover:text-slate-700"
      aria-label="Cerrar"
      (click)="closed.emit()"
    >
      <mat-icon>close</mat-icon>
    </button>
  </header>

  <div class="mc-scrollbar max-h-[calc(90dvh-160px)] space-y-3 overflow-auto px-5 py-4">
    @for (item of cart(); track item.supplyId) {
      <article class="rounded-lg border border-slate-200 p-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <strong class="block text-sm font-black uppercase">
              {{ supplyById(item.supplyId).name }}
            </strong>
            <small class="font-bold text-slate-400">{{ supplyById(item.supplyId).brand }}</small>
          </div>
          <button
            type="button"
            class="flex size-8 items-center justify-center rounded-md text-red-500 transition hover:bg-red-50"
            aria-label="Eliminar artículo"
            (click)="remove(item.supplyId)"
          >
            <mat-icon class="!text-[19px]">delete_outline</mat-icon>
          </button>
        </div>

        <div class="mt-4 grid gap-4 sm:grid-cols-[150px_1fr]">
          <div>
            <label class="mb-1 block text-xs font-black uppercase text-slate-500">Cantidad</label>
            <div
              class="grid grid-cols-[36px_1fr_36px] overflow-hidden rounded-md border border-slate-200"
            >
              <button
                type="button"
                class="flex h-9 items-center justify-center bg-slate-50 text-slate-600 hover:bg-slate-100"
                (click)="decrease(item.supplyId, item.quantity)"
              >
                <mat-icon class="!text-[18px]">remove</mat-icon>
              </button>
              <input
                type="number"
                min="1"
                class="h-9 w-full border-x border-slate-200 text-center outline-none"
                [ngModel]="item.quantity"
                (ngModelChange)="updateQuantity(item.supplyId, $event)"
              />
              <button
                type="button"
                class="flex h-9 items-center justify-center bg-slate-50 text-slate-600 hover:bg-slate-100"
                (click)="increase(item.supplyId, item.quantity)"
              >
                <mat-icon class="!text-[18px]">add</mat-icon>
              </button>
            </div>
          </div>

          <div>
            <label class="mb-1 block text-xs font-black uppercase text-slate-500">
              Observación del artículo
            </label>
            <input
              class="h-9 w-full rounded-md border border-slate-200 px-3 text-sm outline-none focus:border-[#45658f]"
              placeholder="Ej. entregar en farmacia..."
              [ngModel]="item.observation"
              (ngModelChange)="updateObservation(item.supplyId, $event)"
            />
          </div>
        </div>
      </article>
    } @empty {
      <div class="py-12 text-center text-slate-500">
        <mat-icon class="mb-2 !size-10 !text-4xl text-slate-300">shopping_cart</mat-icon>
        <p>No hay artículos en el pedido.</p>
      </div>
    }
  </div>

  <footer
    class="flex flex-col gap-3 border-t border-slate-200 px-5 py-4 sm:flex-row sm:items-center sm:justify-between"
  >
    <button
      type="button"
      class="flex h-10 items-center justify-center gap-2 rounded-md border border-[#45658f] px-4 text-sm font-bold text-[#203f75] transition hover:bg-blue-50"
      (click)="continueShopping.emit()"
    >
      <mat-icon class="!text-[18px]">add_shopping_cart</mat-icon>
      Seguir agregando
    </button>

    <div class="flex flex-col-reverse gap-3 sm:flex-row">
      <button
        type="button"
        class="h-10 rounded-md border border-red-200 px-4 text-sm font-bold text-red-600 transition hover:bg-red-50"
        (click)="cancel()"
      >
        Cancelar pedido
      </button>
      <button
        type="button"
        class="h-10 rounded-md bg-[#16a34a] px-5 text-sm font-bold text-white transition hover:bg-[#13833d] disabled:cursor-not-allowed disabled:opacity-50"
        [disabled]="cart().length === 0"
        (click)="confirm()"
      >
        Confirmar pedido
      </button>
    </div>
  </footer>
</section>
