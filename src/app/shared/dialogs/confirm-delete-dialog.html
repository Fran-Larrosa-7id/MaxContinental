<section class="rounded-lg bg-white text-[#082653] shadow-2xl">
  <header class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
    <h2 class="text-xl font-black">Eliminar muestra{{ samples().length > 1 ? 's' : '' }}</h2>
    <button
      type="button"
      class="flex size-9 items-center justify-center rounded-md text-slate-400 transition hover:bg-slate-100 hover:text-slate-700"
      aria-label="Cerrar"
      (click)="close()"
    >
      <mat-icon>close</mat-icon>
    </button>
  </header>

  <div class="px-5 py-5">
    <div class="mb-4 flex gap-3 rounded-lg border border-red-200 bg-red-50 p-4 text-red-700">
      <mat-icon class="text-red-500">warning</mat-icon>
      <p class="text-sm">
        Esta accion elimina {{ samples().length }} muestra{{ samples().length > 1 ? 's' : '' }} del mock actual.
      </p>
    </div>

    <div class="max-h-44 space-y-2 overflow-auto">
      @for (sample of samples(); track sample.id) {
        <article class="rounded-md border border-slate-200 p-3">
          <strong class="block text-sm">{{ supplyName(sample.supplyId) }}</strong>
          <small class="block text-slate-500">{{ clientName(sample.clientId) }}</small>
        </article>
      }
    </div>
  </div>

  <footer class="flex flex-col-reverse gap-3 border-t border-slate-200 px-5 py-4 sm:flex-row sm:justify-end">
    <button
      type="button"
      class="h-10 rounded-md border border-slate-300 px-5 font-medium text-slate-700 transition hover:bg-slate-50"
      (click)="close()"
    >
      Cancelar
    </button>
    <button
      type="button"
      class="h-10 rounded-md bg-[#e62629] px-5 font-bold text-white transition hover:bg-[#c91f23]"
      (click)="confirm()"
    >
      Eliminar
    </button>
  </footer>
</section>
